<!DOCTYPE html>
<html>
<head>
  <!-- Custom Domain Base Href -->
  <base href="/" />

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">

  <!-- SEO -->
  <meta
    name="description"
    content="Vedashree Portfolio showcasing Flutter projects, mobile app development, and professional experience."
  >

  <!-- Mobile Web App -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black"
  >
  <meta
    name="apple-mobile-web-app-title"
    content="Vedashree Portfolio"
  >

  <!-- Apple Touch Icon -->
  <link
    rel="apple-touch-icon"
    href="icons/apple-touch-icon.png"
  >

  <!-- Favicon -->
  <link
    rel="icon"
    type="image/png"
    sizes="32x32"
    href="icons/favicon-32x32.png"
  >

  <link
    rel="icon"
    type="image/png"
    sizes="16x16"
    href="icons/favicon-16x16.png"
  >

  <link
    rel="shortcut icon"
    href="favicon.ico"
  >

  <!-- Title -->
  <title>Vedashree Portfolio</title>

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Open Graph -->
  <meta
    property="og:title"
    content="Vedashree Portfolio"
  />
  <meta
    property="og:description"
    content="Portfolio showcasing Flutter projects, mobile development, and professional work experience."
  />
  <meta
    property="og:image"
    content="https://vedashree.it.com/assets/assets/preview.png"
  />
  <meta
    property="og:url"
    content="https://vedashree.it.com/"
  />
  <meta
    property="og:type"
    content="website"
  />

  <!-- Twitter -->
  <meta
    name="twitter:card"
    content="summary_large_image"
  />
  <meta
    name="twitter:title"
    content="Vedashree Portfolio"
  />
  <meta
    name="twitter:description"
    content="Portfolio showcasing Flutter projects, mobile development, and professional work experience."
  />
  <meta
    name="twitter:image"
    content="https://vedashree.it.com/assets/assets/preview.png"
  />

  <!-- Lottie -->
  <script src="https://unpkg.com/lottie-web/build/player/lottie.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    #lottie {
      width: 220px;
      height: 220px;
    }
  </style>
</head>

<body>

  <!-- Loader -->
  <div id="lottie"></div>

  <!-- Flutter Bootstrap -->
  <script src="flutter_bootstrap.js" async></script>

  <script>
    const lottieContainer =
      document.getElementById("lottie");

    lottie.loadAnimation({
      container: lottieContainer,
      renderer: "svg",
      loop: true,
      autoplay: true,
      path: "assets/assets/loading.json",
    });

    window.addEventListener(
      "flutter-first-frame",
      function () {
        lottieContainer.style.display = "none";
      }
    );
  </script>

</body>
</html>
